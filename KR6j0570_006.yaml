body:
  text: 隋天竺三藏法師闍那崛多等譯三法藏品第十二法師相品第十三謗法果報品第十四勸受持品第十五三法藏品第十二爾時放光如來復告毗舍佉言毗舍佉如我所説三種業藏若善思義則能得入一切法門毗舍佉若人願樂成就此法當勤精進何以故懈怠之人終不能到所以者何是人不能具足愛樂如是正法是故應當依善知識深心勤學毗舍佉譬如妙寶或頗梨珠或琉璃珠并餘淨寶置池水邊能令其水同於寶色何以故以此寶珠清淨力故遙相映發能令彼水隨逐寶色如是如是毗舍佉一切衆生近善知識其事亦爾又彼水中隨投餘物亦作寶色此寶威光能變餘色異此寶外不能變也毗舍佉今此三種方便業藏亦復如是若人自學若教他學一切人天無能壞者毗舍佉此三種藏乃是諸佛如來言教一切所有吐發語言音聲詞辨論難解義及諸譬喻皆悉從此三教藏生毗舍佉若人受持三藏義者終不為彼外道邪論之所破壞假使滿閻浮提無量衆人一切皆是聰明外道諸大論師一切悉來種種問難終不能屈毗舍佉置閻浮提滿中論師假使此四天下滿中衆生乃至皆能論議問難亦不能屈復次毗舍佉置四天下假使遍滿三千大千世界衆生一切皆是大論議師若佛經典及外道書籍盡能受持彼等咸來一時問難悉皆能答無有滯礙何以故由佛法中先經學此三方便故是故毗舍佉有諸法師若在家若出家但能受持此三法藏一切問難隨意能答何以故此法即是無量無邊智根本故毗舍佉此法希有不可思議名一切世間難壞經典我今略説汝尚不解何況多説毗舍佉其有久習智慧方便乃能分別此三業藏何以故佛智深大衆生心小不能容受如此大智若能解知則得斷除一切衆生無量疑網又毗舍佉若人雖能持此三種業藏言教若不知方便則不能知入之方便云何而能解釋此也佛告阿難彼放光如來應供正遍覺如是説已時毗舍佉復問放光如來言世尊如此三種業藏根本云何得生從何所來去至何所佛言毗舍佉我還問汝隨汝意答毗舍佉於意云何如此風界從何而生為大為小為狹為寬為長為短為麁為細從何而來去至何所何姓何家何村何落何城何國乃至如是生處分齊形量大小去來依止皆可知不毗舍佉言不也世尊如此風者不可得知無處所故不可得見無相貌故乃至家姓生處皆不可知世尊如此風者從虛空生無所依住無有方所遍一切處如是毗舍佉風從空出無有方所家姓生處實不可知如是如是三種業藏言教方便亦復如是無有方處無所從來亦無所去無生無滅何以故佛法無量唯佛智知摩那婆此三業藏實不可知終無有能得其邊際及以數量若一劫若減一劫若百劫若百千劫若百千億那由他劫乃至無量無邊不可數劫亦不可知唯佛世尊乃能知此三種業藏隨其根性而為説耳摩那婆是故汝等應當知此三種言教無有住處無有邊際何以故諸佛菩提無有住處亦無依止乃至行業因緣體性無所從來亦無至處若能知此即知業藏無有住所無量無邊爾時毗舍佉婆羅門復白放光佛言世尊云何業緣佛告毗舍佉於意云何初入胎時名為何等毗舍佉言世尊是謂水界名迦羅邏佛言此迦羅邏過初七日復名何等名頞浮陀佛復問言是頞浮陀過七日已復名何等名蜱羅尸佛復問言是蜱羅尸過七日已復名何等名曰伽那佛復問言此伽那者過七日已復名何等世尊是迦羅邏頞浮陀蜱羅尸及伽那等過是已後名之為受佛言毗舍佉當知此受本來無實唯有虛妄虛妄因緣和合而生因由此故一切身分支節得生所謂五皰生故皮肉生皮肉生故筋骨生筋骨生故髓腦生髓腦生故髮毛生髮毛生故甲齒生甲齒生故一切身分支節等生如是一切身分支節皆無所從來無有住所悉從因緣和合而有如是五陰十二入十八界相貌形色大小長短皆亦無所從來無有住處彼若實有應有去來如是一切無有住處悉不可知既無有名云何可説毗舍佉若以父母因緣和合當於是時識支託胎成迦羅邏大名為藏者如是毗舍佉若彼父母不和合時是則無有迦羅邏大乃至無有皮肉筋骨及諸髓腦髮毛爪齒一切身分云何得有色形長短五陰十二入十八界十二因緣住處往來也又若此識不與一滴精水和合處胎中者形色等物皆不得成又若不與十二因緣相和合者乃至老死亦不得生若無生成云何而得有名有説如是毗舍佉但以十二因緣相續力故色受想行識等和合而生如是毗舍佉此三種言教方便業藏無有方所無有邊際亦無去來當知此法無生無滅無有根本不可窮極復次毗舍佉應當知是三種言教方便業藏何等名為三種藏也一者人言教藏二者天言教藏三者非人非天言教之藏婆羅門所言人言教者彼等皆以語言相應當知是名人言教也毗舍佉所謂天言教者事相異故得有見聞如實不異生如是心如是思惟方便知已能得禪定天眼天耳及天心智皆由一心攝念力故則得如是清淨智生是名最上清淨天言教也毗舍佉所言非人非天言教藏者大慈悲生攝三言教出三乘道及一切法是故名藏此教方便依大悲果遍一切處觀於惡道諸衆生等唯有衆苦一心拔濟無異思惟故名大悲利益彼故故言言教毗舍佉此三業藏所生住處諸佛菩薩常一心念作彼護持大法炬陀羅尼經法師相品第十三復次婆羅門更有加持力因常精進生云何名為加持力因精進生也若有沙門婆羅門欲得具足如來辨者皆由勤心精進所致而能於一時間説百千萬億修多羅章句無有窮盡何以故以彼善能成就口業因加持力得無礙辨以是辨故於一切問答不可窮盡無有斷絶譬如高岸峻流下注雖欲遮止終無斷絶彼流下時乃至小水尚難斷塞豈況大河如是毗舍佉若有法師於此三種言教業藏修習辨才乃至一日若聞若誦或復思惟彼精進故隨宜演説猶無斷時諸餘問難寧能沮壞毗舍佉譬如泉流但入於河不至海者無有是處若人久修精進於此陀羅尼中休廢者無有是事我今少説如大海中取一微滴豈能損減我今説此大陀羅尼精進辨才法門少分亦無損減如是毗舍佉汝應當知得彼三種業藏辨才能照一切諸法根底於諸問難不可窮盡何以故以此法門無邊際故復次毗舍佉其有得是精進加持辨才藏者當問難時或他毀辱應生歡喜起大慈心不見罵辱不觀自他無有我所亦無怖懼何以故一切內外諸有畏惡悉滅無故毗舍佉是為法師口業成就復次毗舍佉若諸法師處座説法或有比丘比丘尼優婆塞優婆夷四衆圍繞如是衆等或經久學或有始聞或有信心或不信者其中衆生若覩女人形貌端正生染著心忘失法念爾時法師應善觀察以巧方便調伏彼人明示罪相令其覺悟內生慚愧勿令彼瞋何以故若彼瞋恨起不善心是人或時毀辱法師誹謗經典障礙佛法過患轉增是故毗舍佉若諸法師欲行呵責調伏事者應先自除欲瞋癡慢然後教訶令他除斷若自不斷令他除者無有是處是故法師要先自行然後正人不應先取他人之過自虧己德何以故毗舍佉一切衆生欲縛深厚貪境現時不顧自身若捨方便先行呵責唯增瞋垢如火燒薪瞋恚盛時癡更增長三毒煩惱一時俱作而諸衆生三毒盛發不聞外言不憶己事善法惡法一切不知假或暫聞不能納受毗舍佉彼諸衆生三毒發時猶如盲人不識道路平夷艱險亦如聾人不聞音聲麁鄙精妙又如醉人不醒方所東西南北如鬼著者不安其處猖狂妄言一切衆生毒火燒心不覺善惡亦復如是毗舍佉如是衆生煩惱盛時法師應為説對治法不淨觀等令彼速疾得無漏智燒彼衆生三毒諸結如是毗舍佉是為大智辨才法師能於比丘比丘尼優婆塞優婆夷等四部衆中方便開導令皆歡喜滅彼衆生諸煩惱病復次毗舍佉若諸法師欲説法時應先觀察衆生根宜然後隨須而為演説若知衆生聞於布施獲利益者法師即應先説布施令彼歡喜當知此時不應更説諸餘法門或復有人樂欲持戒法師則應為説持戒亦不得説餘深法也如是衆生或時樂行忍辱精進禪定智慧乃至樂聞種種法門即皆為説令速開解毗舍佉如是法師應勤精進方便説法何以故若欲成佛要於無量無邊劫中勇猛精進勤修苦行乃至捨身手足頭目髓腦如餘經説又諸法師不應諍論夫諍論者即是無明煩惱根本是故法師應勤精進速滅無明亦勸他離毗舍佉是諸法師要先具備如上功德然後為衆方便説也毗舍佉法師常當如是思惟我今所處即是如來師子之座宜應忍默何忽起瞋隨彼衆生一切問難我當解釋皆令歡喜作是念已諸有諍論彼我之心自然消滅復次毗舍佉夫法師者常應慈慜愛語謙下將護衆心何以故若懷瞋妬心存勝負獲大重罪慈心説法成大功德能令佛法久住於世凡所生處常得值遇諸佛菩薩及衆聖賢能消世間種種供養假以高大師子寶座又以億數無價名衣奉上法師豈能報彼法師恩德而彼法師雖受是事應深慚愧勿起貪心應生慈慜不得我慢無令消滅施主善根當令衆生咸得歡喜復次毗舍佉若諸法師凡欲説法調伏衆時必須聰慧利根多聞博識形貌端雅正見家生三業清白衆德具備著淨潔衣威儀齊整如是法師衆應勸請然後説法何以故諸佛如來具足修集三十二相功德圓滿然後方始轉大法輪衆生聞已勤修大人丈夫相行是故法師凡説法時應當次第説三十二相果報如是善根如是亦次第説三業清淨業清淨已然後為説布施行等諸清淨法乃至種種差別義門云何復名次第説也毗舍佉譬如童幼初受教時彼師先授摩帝迦字次授頞字後授阿字如是次第教十四音已復次第教三十四字具教如是五十二字已然後分別一切音聲字體名言諸教藏事乃至顯説不思議力若人成就彼無礙辨便能隨意次第差別説諸教義成就不忘能知諸佛三十二相及餘功德具足圓滿為衆普宣一切諸法名句味身心善思惟必定不虛而彼法師當説法時諸聽法衆乃至得聞一句法相隨順而解一切顛倒異想不行何以故能知諸法如實説故是名清淨次第説相復次毗舍佉譬如射師教諸童子初射法術先於平地置七步垛然後量力授弓與箭告童子言我當教汝汝今宜可學射彼垛爾時童子雖受師教以初學故其所放箭若至不至終不能中師教無倦稍得近垛是兒後時年漸長大為學不已隨放便著無落垛者如是毗舍佉彼説法師教徒衆時亦應如是宜察衆生上中下根漸次教授不可一時頓説深法何以故若不知根妄説法者令他失利增長顛倒是故應當先為説彼六波羅蜜次第修已然後為説空解脫門若為衆生説此空法或有得聞或有思惟或能證者是亦不應但有言説何以故如是空法不可唯以心想知故若彼空法但以心想能證知者一切衆生未修道時亦應即是阿羅漢也毗舍佉彼空法者亦不可説相貌形體若可説者則是作相若有作相則有願求若有願求則是三世何以故毗舍佉無相法中一切三世皆不可得所以者何過去未來現在等事皆寂滅故云何起願復次應觀是色作無相想云何觀色作無相想當知此色生滅輪轉念念不停毗舍佉如是色相不可眼見當知彼是心識境界唯意所知是故不可以眼得見毗舍佉一切衆生所有心意不可言説唯佛智知雖可慮知而不可見念念不住猶如幻化云何可取而可得見如是毗舍佉不可以彼衆生心識取心真相既不可取云何可説何以故以愛憎事違平等故毗舍佉若欲滅除愛憎想者當勤精進觀一切法悉皆空寂無有取著復次婆羅門若能如是除滅愛憎不取法相當知即是無相解脫門知無相已如是次第不起願求無願求處當知即是無願解脫門如是復觀一切諸法皆悉平等無有取著所謂不見眼及色乃至不見意及法若能如是不取不著斷滅憂喜得平等心當知此是空解脫門以能得此三解脫門三世平等為方便已然後得入無生觀中復觀彼色從何而生因於邪念不淨而生知從邪念起男女想男女想故起愛著心愛著增已和合欲事名破梵行彼和合時即成胎藏是名迦羅邏大此迦羅邏時不可説有男女形相毗舍佉當知如此迦羅邏相唯佛如來聖智所知是故如來於彼時中教諸弟子汝等今應正觀色相云何觀色謂如實知是無常等彼既聞已即時所有欲想色貪皆得除滅色欲滅已如是喜樂憂悲苦惱一切皆滅毗舍佉初未有人於迦羅邏始受胎時能證知彼若男若女出母胎時無有一法從餘處來亦無一法去至餘處唯有精水赤白和合成迦羅邏藏如來於彼建立為因而實諸法無有住處何以故一切諸法無生滅故如修多羅中次第説也如是毗舍佉汝等於此當勤修學是則名為宣説過去諸言教事既自知已亦為他説如是次第説未來事此現在事如迦羅邏中説如水泡如沫聚如陽焰如芭蕉如幻化都無真實如是十二因緣次第相續生至老死亦復如是譬如虛空有時雲翳有時清明豈有教者如是界大和合無有作者是中唯有如實正法無增無減然有無量業行差別法界義門當如是説爾時毗舍佉婆羅門白佛言世尊彼諸法師若他來問若自欲説去來現在三世之事忽然疲倦迷惑不解如此法障當云何除佛言婆羅門若諸法師他問疑惑若生疲倦不能説者如是法師以未通達三種言教方便藏故設知少分但得名字不間義理如是毗舍佉此三世事無量無邊難可窮盡是故初中後際生滅旋轉喻如風輪無有邊際毗舍佉而彼風輪終無有人知其限齊形量大小去來現在亦復如是如彼時節始自一日二日乃至十日半月一月乃至一時半年一年乃至無量其實不知從何所來去至何所又如光影無有形礙時節晝夜往來可知去來現在不可數知亦復如是如是三世既不可知亦不可見既不可見則無所有既無所有則無名字若無名字云何可説毗舍佉是中以因緣故有此三種言教方便汝當善思如是法句於聽説時莫生疑惑唯念法師諸根寂靜專求智辨勿起諍論何以故知法之人無諍論故若諸法師當説法時衆中有人起諍論者法師應教念彼智力陀羅尼句滅彼魔事大法炬陀羅尼經謗法果報品第十四爾時毗舍佉婆羅門復白佛言世尊若人於此三種法中生疑謗者當云何滅佛告婆羅門若有於此三種法門生疑謗者在家出家一切法師悉不能除何以故毗舍佉於佛智中深起疑謗破滅一切善法根本是故無人能為除斷毗舍佉復白佛言世尊若人於是諸佛如來大慧門中生不信者有何果報佛言婆羅門是人造業世間極重是以一切尤重惡報皆在斯人斯人永失佛法深利三世諸佛同共放捨於甚深法無有信樂自既不信一切佛法復教他人多生誹謗恆樂隨逐極惡朋友學習愚癡增長邪見常為己身貪嗜衣食是人未來雖聞諸佛説諸妙法亦不生信以其現無信分善根故如是之人自於佛法起深障礙復更令他無量衆生於正法中作深障礙以是因緣具受種種無量大苦何以故以具惡業斷善根故所以者何是人皆由自習愚癡無智邪見復教多人無智邪見聞説深法不能信受而生輕慢以輕慢故不能咨問智人勝法毗舍佉若有智者常應咨問不當親近愚癡邪見無智衆生若人聞此三教藏時不信行者汝知是人乃至一切天人世間不能令其歡喜信解若聞説此三種業藏不生信解假使更聞諸餘法相能生信者無有是處當知是人去佛法遠如是愚冥無智衆生凡所行作不可隨順乃至有説亦勿聽受我實不能分別具説是謗法人所生惡趣我亦不欲説是謗人所受生處身量分齊形體容貌可異醜惡何以故若我具説衆生聞之或當怖死故我不説如是毗舍佉若人於法乃至一句欲作障礙生謗毀者彼所得報不可具説我今為彼未謗之人明識斯過故少説耳毗舍佉假使於此三千大千世界所有諸大地獄及小地獄彼謗法人悉生其中具受諸苦何以故以其斷滅一切善根復令無量無邊衆生起謗法心增長邪見諸惡行業是故備經惡道受殃如是衆生出地獄已更生餘趣經無量世癡騃無知若生人間不得正念諸根暗濁狂亂失心喜習邪法不識義理毗舍佉是人所受果報形量時節分齊我今略説如是三千大千世界所有一切草木樹林盡以為籌計其罪報不可為比身形麁醜難可具論凡所至處皆成苦緣斯由謗法獲如是報大法炬陀羅尼經勸受持品第十五阿難時放光如來告毗舍佉婆羅門言毗舍佉是故汝等從佛所聞如是三種言教藏義應至心聽專念受持勿興餘想毗舍佉如來所説三藏法門無法可説無可聞見亦無一法可得開示若知如來如是説已於餘法門生疑惑者無有是處何以故諸佛世尊不空説故如是説時若有人聞不信不受復障礙他是人自起無明邪見更令無量無邊衆生起謗法心我慢貢高不知咨受不往聽聞喪失深法不知義理隨逐邪友遠離智人以是因緣多受惡報毗舍佉譬如虎子從生隨母日見其殺及身長大殺業自成毗舍佉衆生亦爾親近惡友具造邪業墮於地獄畜生餓鬼受大苦惱毗舍佉以是因緣汝等應先自正身心然後説法勿忘自正損己陷人毗舍佉以是義故如來應供正遍覺建立宣説三種言教方便業藏汝等應知一切衆生心所思念口所欲問身所欲行如是知已慈心教示衆生聞已歡喜受行是故汝等當為攝受諸衆生故修學大慈爾時毗舍佉婆羅門復白放光佛言世尊我聞略説尚未能解唯願如來更為具説三種業藏令我等知佛言毗舍佉我今問汝汝應正答於意云何譬如世間有異良馬生駒未幾身體柔弱氣力未成人欲乘之帶甲持仗負諸鬪具入陳決勝是人所作可稱心不毗舍佉言不也世尊是愚癡人云何能濟佛言毗舍佉如是如是如汝所説其有新發意菩薩及二乘人少智少行未得神通聞我所説悉不能受反更迷惑生四顛倒如彼馬駒年齒未滿氣力未成猶故不堪負重入陳毗舍佉若使是駒毛骨漸成齒歲具足身雄氣猛耳目明利令人騎乘負重致遠輕行掩襲臨敵決戰不慮驚敗直入無前乃至震鼓吹蠡揮刀奮矟亦無驚恐何以故年齒滿故身力成故數調習故種性良故如是毗舍佉汝等若得四無礙辨諸力無畏然後堪受三種教藏聞衆麁語不起恨心復能受持一切佛法如彼良馬身健力成然後方能負重入陳毗舍佉是為第一戰鬪事也所謂開示佛法教化他時若必多有鬪具器仗是時外道雖有種種異端諍論皆能忍之不生怖畏汝等當知蠡貝鼓者是謂説佛法時多諸留難亦能堪受不生怖畏若有精勤修習受持而行佛法則無障礙若有出家破戒愚癡不能依行則有障礙設能學者或墮聲聞辟支佛地毗舍佉若有長夜具足精勤修行佛法彼於此法猶尚難知或得少分況復不修更受惡法彼人於此大乘藏中無有信心云何能知云何能解毗舍佉汝於如是諸衆生等常起慈心不應放捨若有衆生起正念心但學一偈或唯句字乃至七日汝等亦應勤教授之隨彼衆生若成不成汝等皆獲無量功德毗舍佉諸佛世尊凡所演説皆為利益一切衆生或信不信或行不行諸佛世尊口業成就但有所説聞必蒙益無空過者其間或有雖不現獲皆亦已作當得因緣毗舍佉汝等欲得修證如是如來藏者應於如來及如來法中起平等想行平等行
