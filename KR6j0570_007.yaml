body:
  text: 隋天竺三藏法師闍那崛多等譯智成就品第十六忍成就品第十七證涅槃品第十八智成就品第十六佛告阿難時彼衆中有一菩薩摩訶薩名栴檀那白放光如來應供正遍覺言世尊如佛所説三法藏門攝諸言教我等已聞世尊我雖聞是三種言教未達義理今更咨問唯願為我具釋其義世尊我於如來三藏義門重請問者不為戲論亦無是非不起執著又無疑惑我但為彼非佛法人外道諸師或時復説三藏義門我等云何當能聽受阿難時彼放光如來應供正遍覺告栴檀那菩薩摩訶薩言善哉善哉栴檀那如是如是栴檀那非但汝於此法不生疑惑然此法中亦無可疑汝栴檀那汝應當知於此法中無彼外法彼外法中亦無此法我今解説汝至心聽若諸法師得此三種業藏義者則能解知一切衆生諸心差別亦能解知衆生業行善惡不同然彼法師欲説法時要先觀察衆生心根及以業行然後為説栴檀那當知有諸菩薩摩訶薩具神通力無智慧力有智慧力無神通力有得神通亦智慧力彼得神通無智慧力及有智慧無神通力者皆於生死不速出離若得神通及智力者彼於後時能荷重擔摩那婆其能荷負大重擔者唯有智力則無退失所以者何摩那婆有諸外道及以仙人五通具足能作種種自在變化能分一身以為多身而是神通有時退失以退失故還自害身何以故皆由無彼智慧力故是故若有智慧力者終不害身亦無染污常生天上不入惡道復次栴檀那今此會中現有無量百千萬億人衆來集皆為聽法如是乃至十方各有無量百千萬億人衆亦悉來集復有無量諸天大衆所謂四天王天乃至他化自在天是一一天各有百千萬億衆亦皆來集復有無量色界諸天衆謂大梵天衆乃至淨居天衆亦來聽法旃檀那若有如是大衆集時彼菩薩摩訶薩於此三種業藏門中應當了知種種因緣種種衆生種種心行種種作業種種身口意若彼法師解此三種方便藏門即知衆生心行所趣知彼衆生有種種疑有種種問能種種答若不問者法師即應知彼心意有信不信從其初心乃至多心法師悉應次第了知知已為決勿令諍論法師如是應為衆生若略若具隨宜宣説法師先須自成智力及精進力於自學時應當念離睡眠懈怠如是學已令彼無量億百千數諸天人衆伏其聰明及與威德然後為説復次摩那婆汝等若能成就智力精進力已應復更學大精進心何以故若不能令人心伏者云何能化欲色諸天摩那婆汝等但自思惟莫謂如來於諸法中而生慳吝亦勿謂我於衆生處起輕蔑心諸佛世尊於畜生所尚不欺慢何況菩薩摩訶薩也為衆生故如來出世若住一劫若減一劫若無量劫為化菩薩故在中生摩那婆若使現有菩薩摩訶薩樂聽正法如來祕吝不為説者無有是處汝善諦聽我當説喻摩那婆譬如長者唯有一子家饒財寶及諸僕使而彼父母嚴敕家人侍衛守護不令傷損無諸疾苦寒暑飢渴水火衆難不適之事皆令遠離亦令具足種種醫藥飲食衣服房舍床敷凡是資須無所乏少為是兒故供養乳母上饌美味亦常豐足如是摩那婆如來應供正遍覺為菩薩父常教菩薩行六波羅蜜將養衛護菩提之心不令退沒何以故為欲增長菩提心故令心不慳不瞋不懈怠乃至令心不復退壞所以者何以不退故速得成就阿耨多羅三藐三菩提是故如來常教菩薩為菩薩父亦名導師以能不退菩提道故名為導師又不斷絶菩提道故復名導師佛告阿難爾時栴檀那菩薩摩訶薩聞佛説已即復問彼放光佛言世尊今此無量億數衆中頗有菩薩得此法不佛言栴檀那汝今何緣過深憂慮以菩薩衆重問如來斯諸菩薩皆於如來深密法中信心牢固猶若金剛何事方言此菩薩衆有得如是深法不耶栴檀那復言世尊此億數菩薩衆中有如是法如佛説不佛言摩那婆豈汝自心有斯疑慮如是問我此菩薩衆有是法不摩那婆汝於如來有誠實心何故復發如是咨問此大衆中有是法不以汝疑故今更引喻譬如祭火光王有一大臣在大衆中發如是言我今信知此火光王能行布施乃至能捨所重身命是人於後在大衆中復發是言是火光王貪惜積聚乃至少分亦不能施摩那婆汝亦如是初作是言我信如來應供正遍覺今不能信我所説法隨喜奉行便與先言自不相副唯數問我三種教藏然不知我智力精進一切諸事摩那婆有人聞説如來十力四無所畏無礙辨才即能信解諸餘衆生寡聞少智不能咨問如是衆生難思難入此等若能信解思量分別如來諸力無畏辨才等者無有是處何以故摩那婆此業難入要於無量百千億劫修行諸波羅蜜等然後乃能信解如是力無畏等摩那婆或有衆生聞上所説諸功德事不生信者我於是人亦常教攝終不放捨是故汝等常應修學大法炬陀羅尼經忍成就品第十七爾時栴檀那菩薩復白放光佛言世尊云何菩薩摩訶薩成就忍力學佛如來為諸衆生作利益事住自忍中而能於彼外道邪師一切大衆百千問難無有傾動佛言摩那婆汝問忍力忍力多種汝問我何等忍力所謂有諸如來忍有諸菩薩忍有諸阿羅漢忍有阿那含忍有斯陀含忍有須陀洹忍有八人地忍有信行人忍亦有諸外道五通神仙忍摩那婆今有如是種種忍門汝於是中問何等忍時栴檀那菩薩摩訶薩言世尊我於是中問菩薩忍世尊菩薩摩訶薩得何等忍便能具足一切佛法豈非菩薩忍力依止如來大忍力已乃得具足一切佛法耶佛言摩那婆實亦依止如來忍力成就佛法然非成就一切佛法摩那婆彼忍所作汝宜諦聽我今當説摩那婆當知一切菩薩摩訶薩具足忍力凡有四種平等之心何等為四所謂菩薩摩訶薩若起瞋心隨起即覺覺已即能對治除斷摩那婆當知是為菩薩摩訶薩具足成就第一忍力復次摩那婆菩薩摩訶薩若被他人惡口罵詈誹謗毀辱或以身手若打若擊種種苦惱不可耐事悉皆能受無報答意亦無恨心摩那婆當知是為菩薩摩訶薩具足成就第二忍力復次摩那婆菩薩摩訶薩若見無量諸惡衆生常行惡業不知恩德不孝父母不愛親戚不順師長不敬沙門婆羅門遠離善友無有信心菩薩雖見如是等類諸惡衆生心無嫌恨不求其短而常誨誘安住善法摩那婆當知是為菩薩摩訶薩具足成就第三忍力復次摩那婆菩薩摩訶薩若見衆生不信因果貪染現樂性多瞋恚忿恨鬪諍好求他過邪見愚癡乖背正法當起慈悲導令歡喜然後安置於正法中摩那婆當知是為菩薩摩訶薩具足成就第四忍力汝等應知若諸菩薩住此忍中如法行者更復能起增上忍力又忍與法恆自相應若不學法則不能忍欲住忍者應當勤學復次摩那婆若諸菩薩摩訶薩成就忍者必得具足多種功能或時復有種種苦事逼迫其身所謂惡罵毀辱繫縛撾打楚毒酸切不可堪忍菩薩於中不生怨心終無恐怖亦不逃避甘心忍受具足忍時自然即得八種增上勝功德事何等為八所謂菩薩摩訶薩成就忍已凡所生處身所經歷有大名聞衆人愛敬讚美流布遇善知識朋友親屬皆是世間尊豪勝上乃至一切天龍神鬼見此菩薩生希有心歡喜愛樂摩那婆是為住忍菩薩摩訶薩第一增上勝功德事復次摩那婆菩薩摩訶薩於諸衆生常行恩德或時有人被菩薩德不識恩故反為怨讐不喜聞見菩薩所作威力勝恩諸功德事起嫉惡心陷害菩薩所謂一切呪術蠱魅毒藥刀杖種種惡事圖欲中傷菩薩以有此忍力故終無損壞摩那婆是為具忍菩薩摩訶薩第二增上勝功德事復次摩那婆菩薩摩訶薩具此忍已便得無量智慧辨才善能宣説種種法門何以故如是菩薩得住忍已世間所有善行衆生學佛世尊若學羅漢及餘聲聞若學菩薩摩訶薩者如是菩薩為欲攝取大菩提故皆詣彼所求問如是修多羅義更復於此陀羅尼中第十八分天宮殿事次第不斷於彼修多羅中次第能入此第六種分別修行如上所説具足決了如是菩薩復能為他分明説此陀羅尼門三種業藏復能作彼七十二種句門差別説也摩那婆是為具忍菩薩摩訶薩第三增上勝功德事復次摩那婆菩薩摩訶薩具是忍已處大衆會誦説經時若心散亂或念他事於所誦持無量言教文句方便有時忘失當爾之時淨居諸天為菩薩下授所忘失令是菩薩於彼大衆無有恐怖增益辨才先所忘謬明了無遺摩那婆是為具忍菩薩摩訶薩第四增上功德勝事復次摩那婆菩薩摩訶薩安住忍已而心悲慜諸衆生故其身常受無量諸苦所謂受彼地獄畜生餓鬼三惡重苦乃至更受人間種種諸苦及憂悲等而彼菩薩以忍力故於生死中無有恐怖變退休息凡所願求隨意而得摩那婆是為具忍菩薩摩訶薩第五增上勝功德事復次摩那婆菩薩摩訶薩具是忍已以忍力故雖處地獄畜生餓鬼三惡道苦不生驚怖於八難中亦不驚怖生死長苦亦無憂怖而彼菩薩以忍力故雖大火聚充滿虛空身處其中亦無驚怖而亦終無退沒之事何以故以是菩薩安住忍時不見己身亦無住處是故無有可恐怖事摩那婆是為具忍菩薩摩訶薩第六增上勝功德事復次摩那婆菩薩摩訶薩成就忍已好樂功德而常行施於布施時先捨床座是以未來凡所生處常生最上大姓大家尊高之所生已即得四種功德何等為四一者飲食財物所謂穀米食具乃至衣服珍寶無所乏少故二者親友眷屬所謂父母乃至奴婢僕使無所乏少故三者安無礙辨所謂凡是生處身心快樂終無違迫不適之事於所生中常得辨才相續不斷諸所至處多以辨才妙語導利衆生四者所生為他愛敬所謂凡所生處形體端嚴人天見聞莫不歡喜雖未出家必與衆生大利益事故常為衆生之所尊重摩那婆是為具忍菩薩摩訶薩第七增上勝功德事菩薩具是七功德已所修行處無有障礙所謂若人若天若梵若魔乃至神鬼不能留難復次摩那婆菩薩摩訶薩具足忍已若出家時悉能棄捨一切所有妻子家屬資財珍寶以忍力故無復染著諸餘煩惱不能障礙如是菩薩於一切處無障礙已若欲成就聲聞乘者即能證獲阿羅漢果禪定解脫無礙辨才若欲成就緣覺乘者或於佛世或無佛世正法滅後觀察因緣得辟支佛若欲成就最勝上乘諸佛所行一切智智具足圓滿者便能成就無上菩提摩那婆是為具忍菩薩摩訶薩第八增上勝功德事大法炬陀羅尼經證涅槃品第十八之一佛告阿難爾時栴檀那菩薩摩訶薩復白放光如來言世尊如來於此陀羅尼經已説第七思量法義然尚未説此法門中一句別義故令我等不得了知世尊先説有一法門名億數入以此法門我今欲問若佛如來默然許者何不説此三種言教方便業藏妙法門也世尊是故我等欲咨問此第七法句入億數門若佛説者令此億數諸菩薩衆則能分別入於甚深無畏之處世尊亦當方便為斯億數諸菩薩衆將來利益故説此第七句門百千億數令次第入思惟義處也世尊若蒙演説我等亦當隨分受持此法門義阿難爾時放光如來讚彼栴檀那菩薩摩訶薩言善哉善哉摩那婆汝今於此甚深法門巧作名字亦善受持言教業藏義亦如是摩那婆汝今為此億數菩薩衆因緣故問我此義如是摩那婆汝今欲聞入億數法門耶栴檀那菩薩言如是世尊佛言摩那婆若佛如來説是第七思惟句義者便已攝此億數法門摩那婆如來世尊於此三種方便言教開示宣説令衆歡喜然後知此億數法門次第得入爾時栴檀那復問世尊云何入此億數法門何故復名億數法門然我須知所入之處世尊我今問此億數法門所入之處亦欲證知若覺知者必當受持復欲增長此億數門所入之處世尊如我所知是入法門為成就忍眷屬義故世尊我實不見是大集中有一菩薩而不成就此深忍門者世尊我見是事故問如來應供正遍覺如是義處世尊如是義處實亦非彼懈怠懶墮貪著利養無有正念樂多睡眠心常散亂耽味世事者能問如是深大法門彼亦不能聽聞讀誦受持思惟乃至不能如説修證阿難時栴檀那如是請已放光如來應供正遍覺告栴檀那言摩那婆是故汝等今當入此億數法門念自受持相與一心莫緣餘事心不散亂身無動搖汝等復當持此法律除滅諍根摩那婆如來應供正遍覺昔在長夜行菩薩時為衆生故備經種種艱難勤苦受彼苦時當知久已住於忍地是故勇猛精進不怠摩那婆若人入此盡際法門乃至於此語義未盡當於是中常應勤學成就忍力具足精進終莫放捨此法門者要須靜心然後證知栴檀那復言世尊是中何等名為如來一句法門我等受持持已欲於修多羅億數法中分別其義世尊我等從佛欲聞是義云何方便教最勝法我等當入或能分別一切法也佛言摩那婆此二種義汝當證知又亦次第入億數法及盡際門句義住處若能如是具分別已其有成就如斯功德及淨持戒者方能得入彼一切門須知入處乃至亦如一一毛孔之處皆無障礙作如是心當竭辨才如法宣説也云何作心謂自生尊重建威德心勝出一切天人大衆如師子王具大自在悉能降伏一切諸獸所謂虎豹豺狼乃至野干狐狸之屬法師亦爾當説法時應生是心我於衆生常為將導乃至一切天魔外道諸異論師我皆調攝如彼師子威制野干起是心已然後為説復次摩那婆菩薩摩訶薩菩提樹下坐道場時願智力故右掌按地出無億數大光明網遍照下方諸佛世界彼世界中所有衆生堪受法者遇斯光已自然即能覺法證法又是光明凡所及處一切世界其間多有無量異衆所謂若沙門衆若婆羅門衆若外道衆若天魔衆若魔所化或問或答或勸或請皆以菩薩往昔本願大誓莊嚴精進力故手按地時彼諸衆等一切所作無不散滅設有存者無復威光不能復言猶如聾啞摩那婆如彼菩薩所有地方手按之處出光明網即現無量億數法門是為初入盡際法門具足無缺我今説已復次摩那婆汝等欲入此最清淨盡際門者亦名千萬入亦名億入當須最先清淨深心思惟觀察斷諸疑網出妙音聲成就辨才然後得入摩那婆是名欲入盡際法門汝宜諦聽爾時諸菩薩衆咸言如是世尊佛言摩那婆汝今當知盡際法門彼入亦爾摩那婆何等名為盡際法門所謂名字從虛空生汝等當知此言教法猶如虛空無有邊際終不可説虛空邊量摩那婆如是入義從虛空生還依虛空如彼風界依止於空如是二法無有邊量亦無住處不可得見亦不可説以二因緣故有言説乃至一切動搖去來摩那婆如彼虛空畢竟無有可作之相如是此入法門次第之處唯彼心相精勤方便求諸法義一心善思如法觀察既觀察已即為億數入盡際門得自在處因起修行布施事業然後宣説具足成就諸波羅蜜斷除他疑開顯法義摩那婆是為第八盡際法門諸佛十力四無所畏以無量辨才説法論義以久修故於大衆中都無怖畏摩那婆是中八種盡際法門及以菩薩右手按地此二種中説何義也謂説此地直下過百億世界彼世界中唯以光明建立佛事若諸衆生堪受化時見觸彼光即獲利益諸菩薩等乃至不説一句法門及以業行然彼衆生已解正法摩那婆彼諸菩薩猶亦未證阿耨多羅三藐三菩提而彼衆生已證佛慧諸法師等亦已受持如是正法摩那婆此事希有不可思議彼諸菩薩乃至不説一句一字唯手按地能令無量無邊世界諸衆生等普得證法具足歡喜摩那婆彼諸菩薩復有一字不名為空以彼往昔精進願智力因緣故手掌按地能與衆生大事利益摩那婆我於今日成阿耨多羅三藐三菩提為諸衆生種種方便譬喻解説而此衆生不樂聽聞不解我法不能奉行亦莫證知乃至不發精進之心我今説此如虛空處所生法中猶不能知況我更説深密勝法云何能生真實定慧也摩那婆所有法數次第名字彼四大和合亦此五陰依止及六入處此亦皆從虛空所生但由妄想分別故有名色四大等分和合宣説此義汝等當知摩那婆是中但為攝受愚癡諸衆生故説陰入等譬如小兒初教學時而彼父母將付其師先通章本然後教餘摩那婆如是如來應供正遍覺為彼愚癡諸衆生等故先分別此四大義為最初處次第説彼衆生諸陰先説名字後説陰事摩那婆當知是中我但宣説色等五法合聚為陰不説實有色等聚也衆生不解妄分別故取色等聚以為定實摩那婆如彼世間二種足迹一陷塵成二踐泥出然是二迹於分別中皆得迹名是謂世間分別説故又如博士為教授彼童蒙小兒書字於板以成章句是亦世間分別説為假名字句其實於彼真法界中本無其迹云何為句如是實中求其迹句終不可得以分別故見有迹句畢竟無有迹句差別如是摩那婆如來説陰其義亦爾所言色者一切五陰於分別中初説此義故立為陰雖言色陰但色自陰不得心等是故第二更立受陰色受雖定猶不得想故次第三更立想陰色受想三雖次第説猶須第四更説行陰雖説行已彼行一切不可得見如是行陰既不可見知云何得入五陰數也是以於中更立識陰為第五也摩那婆如來如是種種方便譬喻言辭開示假名但為一切愚癡衆生得證真法故為世間置立名字假言説耳為彼智人亦假名説故摩那婆汝謂彼色住何處耶當知彼色無有住所何以故彼色既無云何住處摩那婆多有如是方便譬喻次第説已不能證知彼法既無云何可證摩那婆當知是中但滅盡義是滅盡義誰有證者此滅盡義亦是如來為諸聖智如是説也摩那婆於意云何如來豈於一衆生所有吝惜耶摩那婆汝應如是思惟如來曾於何等諸衆生所吝法不説摩那婆諸佛如來宣説法時終無嫉妬祕藏之心但觀衆生受以不受若堪受者即還為説如斯等法摩那婆於意云何此陀羅尼法門名字及三言教方便業藏亦入億數及盡際門誓願智力豈可無因妄為他説耶不也世尊又摩那婆於意云何有人忽以輪王妙食置瓦器中是為理不不也世尊佛言如是如是摩那婆我昔長夜行菩薩時無量劫中受大苦惱其所願求云何令彼諸衆生等解如斯法云何復令諸衆生等自證法已受安隱樂我於今日既成菩提為諸衆生轉大法輪豈於汝等更有愛惜而不宣説若使衆生有欲樂者我當隨宜而為演説復次摩那婆我念往昔於佛世尊名曰寶觀如來應供正遍覺明行足善逝世間解無上士調御丈夫天人師佛世尊十號具足出現世間彼佛世尊初從兜率降母胎時放大光明遍照十方一切世界乃至涅槃恆不斷絶菩薩生時三千大千世界大地諸山樹林及衆藥草石沙瓦礫如是一切咸悉能言變成衆寶摩那婆如是菩薩初為童兒便修梵行年滿三十方始出家時有十八億諸衆生等隨從菩薩咸同出家詣於道場觀菩提樹亦觀花草盡成衆寶菩薩思惟要須草座今此無草我將何施時天帝釋知菩薩心即持九億天上妙衣詣菩提樹為敷座已敬繞菩薩因啓請言人師子王宜升此座菩薩報曰吾已領座汝於今者且還天宮聽我證獲無上菩提然可來此奉見如來應供正遍覺也帝釋聞已禮拜還宮如是摩那婆時彼菩薩日晚方詣菩提樹下結加趺坐安固不動猶如金剛是夜初分獲宿命明於夜中分獲天眼明於夜後分證漏盡明
